name: rivium_push
description: Real-time push notifications, in-app messages, inbox, A/B testing, and more for Flutter apps. No Firebase dependency.
version: 0.1.1
homepage: https://rivium.co/cloud/rivium-push
repository: https://github.com/Rivium-co/rivium-push-flutter-sdk

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: co.rivium.push.flutter
        pluginClass: RiviumPushPlugin
      ios:
        pluginClass: RiviumPushPlugin
